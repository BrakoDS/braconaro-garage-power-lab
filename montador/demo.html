<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montador de Treinos — Braconaro Garage Power Lab (Fase 1)</title>
  <style>
    :root { --bg:#0e0f12; --card:#16181d; --line:#262a32; --txt:#e8eaed; --mut:#8b929d; --acc:#e8b339; --ok:#3ddc84; --bad:#ff5d5d; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--txt); font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; }
    header.top { padding:24px 20px; border-bottom:1px solid var(--line); }
    h1 { margin:0 0 4px; font-size:20px; }
    .sub { color:var(--mut); font-size:13px; }
    .controls { display:flex; flex-wrap:wrap; gap:12px; align-items:end; padding:16px 20px; border-bottom:1px solid var(--line); }
    .field { display:flex; flex-direction:column; gap:4px; }
    label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mut); }
    select, input { background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:14px; }
    button { background:var(--acc); color:#1a1300; border:0; border-radius:8px; padding:9px 16px; font-weight:700; cursor:pointer; }
    button.ghost { background:transparent; color:var(--acc); border:1px solid var(--acc); }
    main { padding:20px; display:grid; gap:16px; max-width:920px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; }
    .card h3 { margin:0 0 6px; font-size:16px; }
    .card h4 { margin:16px 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--mut); }
    .tempos { color:var(--mut); font-size:12px; margin-top:6px; }
    .ok { color:var(--ok); font-weight:600; } .bad { color:var(--bad); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th,td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--mut); font-size:11px; text-transform:uppercase; }
    small { color:var(--mut); }
    ul.aquec { margin:0; padding-left:18px; } ul.aquec li { margin:2px 0; }
    .fin { margin-top:12px; padding:10px 12px; background:#1d1a10; border:1px solid #3a3413; border-radius:10px; }
    .vol { display:grid; gap:5px; }
    .bar-row { display:grid; grid-template-columns:120px 1fr 32px; align-items:center; gap:8px; }
    .bar-lbl { font-size:12px; color:var(--mut); }
    .bar { background:#0c0d10; border-radius:6px; height:12px; overflow:hidden; }
    .bar > span { display:block; height:100%; background:linear-gradient(90deg,var(--acc),#ffd778); }
    .bar-val { font-size:12px; text-align:right; }
    tr.bad-row td { color:var(--bad); }
  </style>
</head>
<body>
  <header class="top">
    <h1>🏋️ Montador de Treinos FULL BODY — Fase 1 (núcleo)</h1>
    <div class="sub">Braconaro Garage Power Lab · algoritmo + dados reais do box · 8 alunos/sessão</div>
  </header>

  <section class="controls">
    <div class="field"><label>Modalidade (treino único)</label><select id="modalidade"></select></div>
    <div class="field"><label>Frequência / dias (semana)</label><select id="combinacao"></select></div>
    <div class="field"><label>Nível</label><select id="nivel"></select></div>
    <div class="field"><label>Semana (ciclo 1–4)</label><input id="semana" type="number" min="1" max="8" value="1" style="width:80px" /></div>
    <button id="btn-um" class="ghost">Gerar 1 treino</button>
    <button id="btn-semana">Gerar semana completa</button>
  </section>

  <main id="saida"></main>

  <script type="module" src="./demo.js"></script>
</body>
</html>
