<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montador de Treinos — Braconaro Garage Power Lab</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><b>BRACONARO</b> · Montador<small>Garage Power Lab</small></div>
    <nav class="tabs">
      <button class="tab active" data-view="dia">Aula do dia</button>
      <button class="tab" data-view="semana">Semana do aluno</button>
      <button class="tab" data-view="alunos">Alunos</button>
    </nav>
  </header>

  <main>
    <!-- ============ AULA DO DIA ============ -->
    <section class="view active" id="view-dia">
      <div class="panel">
        <div class="field"><label>Modalidade</label><select id="d-modalidade"></select></div>
        <div class="field"><label>Nível</label><select id="d-nivel"></select></div>
        <div class="field"><label>Dia</label><select id="d-dia"></select></div>
        <div class="field"><label>Semana (ciclo 1–4)</label><input id="d-semana" type="number" min="1" max="8" value="1" style="min-width:90px" /></div>
        <button class="btn" id="d-gerar">Gerar treino</button>
        <button class="btn ghost" id="d-imprimir">Imprimir</button>
      </div>
      <div class="grid" id="d-saida"></div>
    </section>

    <!-- ============ SEMANA DO ALUNO ============ -->
    <section class="view" id="view-semana">
      <div class="panel">
        <div class="field"><label>Aluno</label><select id="s-aluno"></select></div>
        <div class="field"><label>ou Frequência avulsa</label><select id="s-combinacao"></select></div>
        <div class="field"><label>Nível</label><select id="s-nivel"></select></div>
        <div class="field"><label>Semana</label><input id="s-semana" type="number" min="1" max="8" value="1" style="min-width:90px" /></div>
        <button class="btn" id="s-gerar">Gerar semana</button>
        <button class="btn ghost" id="s-imprimir">Imprimir</button>
      </div>
      <div class="grid" id="s-saida"></div>
    </section>

    <!-- ============ ALUNOS ============ -->
    <section class="view" id="view-alunos">
      <div class="panel">
        <div class="field"><label>Nome</label><input id="al-nome" type="text" placeholder="Nome do aluno" /></div>
        <div class="field"><label>Nível</label><select id="al-nivel"></select></div>
        <div class="field"><label>Frequência / dias</label><select id="al-combinacao"></select></div>
        <button class="btn" id="al-add">Adicionar aluno</button>
      </div>
      <div class="grid" id="al-lista"></div>
    </section>
  </main>

  <script type="module" src="./ui/app.js"></script>
</body>
</html>
